{% extends 'base.html' %}
{% block title %}Edit Book — Edosaic{% endblock %}
{% block body %}
<div class="layout">
    {% include 'components/librarian_sidebar.html' with active='books' %}
    <main class="main-content">
        <button class="hamburger" onclick="toggleSidebar()"><i data-lucide="menu" style="width:22px;height:22px;"></i></button>
        <div class="page-header">
            <div class="header-avatar">{{ user.username.0|upper }}</div>
            <div><h1>Edit Book</h1><div class="subtitle">{{ book.title }}</div></div>
        </div>
        <div class="card" style="max-width:600px;">
            <div class="card-header"><div class="card-title"><i data-lucide="edit" style="width:18px;height:18px;"></i> Update Details</div></div>
            <form method="POST" class="auth-form">{% csrf_token %}
                <div class="form-group"><label>Title</label><input type="text" name="title" value="{{ book.title }}" required></div>
                <div class="form-group"><label>Author</label><input type="text" name="author" value="{{ book.author }}" required></div>
                <div class="form-row">
                    <div class="form-group"><label>ISBN</label><input type="text" name="isbn" value="{{ book.isbn }}"></div>
                    <div class="form-group"><label>Category</label><input type="text" name="category" value="{{ book.category }}"></div>
                </div>
                <div class="form-group"><label>Total Copies</label><input type="number" name="total_copies" value="{{ book.total_copies }}" min="0"></div>
                <div class="form-actions" style="margin-top:16px;">
                    <a href="{% url 'core:librarian_books' %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </main>
</div>
{% endblock %}
