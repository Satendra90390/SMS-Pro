{% extends 'base.html' %}
{% block title %}Add Book — Edosaic{% endblock %}
{% block body %}
<div class="layout">
    {% include 'components/librarian_sidebar.html' with active='books' %}
    <main class="main-content">
        <button class="hamburger" onclick="toggleSidebar()"><i data-lucide="menu" style="width:22px;height:22px;"></i></button>
        <div class="page-header">
            <div class="header-avatar">{{ user.username.0|upper }}</div>
            <div><h1>Add Book</h1><div class="subtitle">Add a new book to the library</div></div>
        </div>
        <div class="card" style="max-width:600px;">
            <div class="card-header"><div class="card-title"><i data-lucide="plus-circle" style="width:18px;height:18px;"></i> Book Details</div></div>
            <form method="POST" class="auth-form">{% csrf_token %}
                <div class="form-group"><label>Title <span style="color:var(--danger);">*</span></label><input type="text" name="title" placeholder="e.g. NCERT Mathematics" required></div>
                <div class="form-group"><label>Author <span style="color:var(--danger);">*</span></label><input type="text" name="author" placeholder="e.g. R.D. Sharma" required></div>
                <div class="form-row">
                    <div class="form-group"><label>ISBN</label><input type="text" name="isbn" placeholder="978-3-16-148410-0"></div>
                    <div class="form-group"><label>Category</label><input type="text" name="category" placeholder="e.g. Mathematics, Science"></div>
                </div>
                <div class="form-group"><label>Total Copies</label><input type="number" name="total_copies" value="1" min="1"></div>
                <div class="form-actions" style="margin-top:16px;">
                    <a href="{% url 'core:librarian_books' %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Add Book</button>
                </div>
            </form>
        </div>
    </main>
</div>
{% endblock %}
