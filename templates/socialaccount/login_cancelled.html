{% extends 'base.html' %}
{% load static %}
{% block title %}Sign In Cancelled — Edosaic{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/auth.css' %}?v=2">{% endblock %}
{% block body %}
<nav class="auth-nav">
    <a href="/" class="auth-nav-brand">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><defs><linearGradient id="an4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6366f1"/><stop offset="50%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#an4)"/><path d="M12 28 C12 28, 14 16, 20 13 C26 16, 28 28, 28 28" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.92"/><circle cx="20" cy="19" r="2.5" fill="white" opacity="0.95"/></svg>
        <span>Edosaic</span>
    </a>
    <div class="auth-nav-links"><a href="/">Home</a></div>
</nav>

<div class="auth-page">
    <div class="auth-form-panel" style="width:100%;max-width:480px;margin:0 auto;">
        <div class="auth-card" style="text-align:center;padding:48px 40px;">
            <h1 style="margin-bottom:8px;">Sign In Cancelled</h1>
            <p style="color:var(--text-secondary);margin-bottom:24px;">The sign in process was cancelled. No changes were made.</p>
            <a href="{% url 'accounts:login' %}" class="auth-submit" style="text-decoration:none;text-align:center;">Back to Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
