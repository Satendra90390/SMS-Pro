{% extends 'base.html' %}
{% load static %}
{% block title %}Google Sign In — SMS Pro{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'css/auth.css' %}">{% endblock %}
{% block body %}
<!-- Top Nav Bar -->
<nav class="auth-nav">
    <a href="/" class="auth-nav-brand">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="40" height="40" rx="12" fill="url(#an3)"/>
            <defs><linearGradient id="an3" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
            <path d="M10 28 C10 28, 14 14, 20 12 C26 14, 30 28, 30 28" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.9"/>
            <circle cx="20" cy="19" r="2" fill="white" opacity="0.95"/>
        </svg>
        <span>SMS Pro</span>
    </a>
    <div class="auth-nav-links">
        <a href="/">Home</a>
        <a href="{% url 'accounts:login' %}" class="auth-nav-btn">Sign In</a>
    </div>
</nav>

<div class="auth-page">
    <div class="auth-form-panel" style="width:100%;max-width:480px;margin:0 auto;">
        <div class="auth-card" style="text-align:center;padding:48px 40px;">
            <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:72px;height:72px;margin:0 auto 24px;">
                <rect width="72" height="72" rx="20" fill="url(#lg1)"/>
                <defs><linearGradient id="lg1" x1="0" y1="0" x2="72" y2="72"><stop stop-color="#818cf8"/><stop offset="1" stop-color="#c7d2fe"/></linearGradient></defs>
                <path d="M18 50 C18 50, 26 24, 36 20 C46 24, 54 50, 54 50" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.9"/>
                <circle cx="36" cy="32" r="3.5" fill="white" opacity="0.95"/>
            </svg>

            <h1 style="margin-bottom:8px;">Continue with Google</h1>
            <p style="color:var(--text-secondary);margin-bottom:32px;">You will be redirected to Google to complete sign in.</p>

            <form method="post" id="auto-google">
                {% csrf_token %}
            </form>
            <script>document.getElementById('auto-google').submit();</script>
        </div>
    </div>
</div>
{% endblock %}
