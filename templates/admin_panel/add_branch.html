{% extends 'base.html' %}
{% block title %}Add Branch — Edosaic{% endblock %}
{% block body %}
<div class="layout">
    {% include 'components/admin_sidebar.html' with active='courses' %}
    <main class="main-content">
        <button class="hamburger" onclick="toggleSidebar()"><i data-lucide="menu" style="width:22px;height:22px;"></i></button>
        <div class="page-header">
            <div class="header-avatar">{{ user.username.0|upper }}</div>
            <div>
                <h1>Add Branch</h1>
                <div class="subtitle">{{ course.name }}</div>
            </div>
        </div>

        <div class="card" style="max-width:600px;">
            <div class="card-header">
                <div class="card-title"><i data-lucide="plus-circle" style="width:18px;height:18px;"></i> Branch Details</div>
            </div>
            <form method="POST" class="auth-form">{% csrf_token %}
                <div class="form-group">
                    <label>Name <span style="color:var(--danger);">*</span></label>
                    <input type="text" name="name" placeholder="e.g. CSE, ECE, Mechanical, Civil" required>
                </div>
                <div class="form-group">
                    <label>Code</label>
                    <input type="text" name="code" placeholder="e.g. CSE, ECE">
                </div>
                <div class="form-actions" style="margin-top:16px;">
                    <a href="{% url 'core:admin_branches' course_id=course.id %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Add Branch</button>
                </div>
            </form>
        </div>
    </main>
</div>
{% endblock %}
