{% load static %}
<nav class="sidebar" id="sidebar">
    <button class="sidebar-close" onclick="toggleSidebar()" aria-label="Close menu"><i data-lucide="x" style="width:20px;height:20px;"></i></button>
    <div class="sidebar-logo">
        {% include 'components/logo.html' with size=36 %}
        <span>Edosaic</span>
    </div>
    <div class="sidebar-profile">
        <div class="avatar">{{ user.username.0|upper }}</div>
        <div class="user-info">
            <div class="user-name">{{ user.get_full_name|default:user.username }}</div>
            <div class="role-badge">Head of Department</div>
        </div>
    </div>
    <div class="sidebar-nav">
        <a href="{% url 'core:hod_dashboard' %}" {% if active == 'dashboard' %}class="active"{% endif %}><span class="icon"><i data-lucide="layout-dashboard" style="width:18px;height:18px;"></i></span> Dashboard</a>
        <a href="{% url 'core:hod_faculty' %}" {% if active == 'faculty' %}class="active"{% endif %}><span class="icon"><i data-lucide="users" style="width:18px;height:18px;"></i></span> Faculty</a>
        <a href="{% url 'core:hod_add_faculty' %}" {% if active == 'add_faculty' %}class="active"{% endif %}><span class="icon"><i data-lucide="user-plus" style="width:18px;height:18px;"></i></span> Add Faculty</a>
        <a href="{% url 'core:hod_librarians' %}" {% if active == 'librarians' %}class="active"{% endif %}><span class="icon"><i data-lucide="library" style="width:18px;height:18px;"></i></span> Librarians</a>
        <a href="{% url 'core:hod_add_librarian' %}" {% if active == 'add_librarian' %}class="active"{% endif %}><span class="icon"><i data-lucide="user-plus" style="width:18px;height:18px;"></i></span> Add Librarian</a>
        <a href="{% url 'core:admin_students' %}" {% if active == 'students' %}class="active"{% endif %}><span class="icon"><i data-lucide="graduation-cap" style="width:18px;height:18px;"></i></span> Students</a>
    </div>
    <div class="sidebar-footer">
        <button class="theme-toggle-sidebar" onclick="toggleTheme()" aria-label="Toggle theme">
            <span class="icon-sun"></span><span class="icon-moon"></span>
            <span class="label-light">Light Mode</span><span class="label-dark">Dark Mode</span>
        </button>
        <a href="{% url 'accounts:profile' %}" class="btn btn-secondary btn-block btn-sm" style="margin-bottom:8px;"><i data-lucide="user" style="width:14px;height:14px;"></i> My Profile</a>
        <form method="post" action="{% url 'accounts:logout' %}" style="margin:0;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger btn-block btn-sm" style="width:100%;border:none;cursor:pointer;font:inherit;"><i data-lucide="log-out" style="width:14px;height:14px;"></i> Logout</button>
        </form>
    </div>
</nav>
