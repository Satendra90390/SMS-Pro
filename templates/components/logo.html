{# Edosaic logo — include with size and class e.g. size=36 class='logo-sm' #}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="{{ size|default:'36' }}" height="{{ size|default:'36' }}" class="edosaic-logo {{ class|default:'' }}" fill="none">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="logo-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="logo-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="40" height="40" rx="10" fill="url(#logo-grad)"/>
  <rect x="0.5" y="0.5" width="39" height="39" rx="9.5" fill="none" stroke="white" stroke-width="0.5" opacity="0.15"/>
  <path d="M12 28 C12 28, 14 16, 20 13 C26 16, 28 28, 28 28" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.92"/>
  <path d="M12 28 C14 24, 16 21, 20 19.5" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M28 28 C26 24, 24 21, 20 19.5" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.4"/>
  <circle cx="20" cy="19" r="2.5" fill="white" opacity="0.95" filter="url(#logo-glow)"/>
</svg>
